name: WASM build

on:
  push:
    branches: [ main ]
    paths:
      - 'wasm-build/**'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  rebuild-wasm:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Cargo registry and build
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            wasm-build/target
          key: wasm-${{ runner.os }}-cargo-${{ hashFiles('wasm-build/Cargo.lock') }}
          restore-keys: |
            wasm-${{ runner.os }}-cargo-

      - name: Cache build tools
        uses: actions/cache@v6
        with:
          path: |
            wasm-build/wasi-sdk
          key: wasm-tools-wasisdk

      - name: Build WASM module
        working-directory: wasm-build
        run: CARGO_BUILD_JOBS=1 make all

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Regenerate Chicory classes and build
        run: mvn install -DskipTests

      - name: Create PR with updated WASM binary
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="chore/rebuild-wasm-${{ github.sha }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add wasm-build/wasm/tree-sitter.wasm
          if git diff --cached --quiet; then
            echo "No changes to tree-sitter.wasm, skipping PR creation."
            exit 0
          fi
          git checkout -b "$BRANCH"
          git commit -m "chore: rebuild tree-sitter.wasm"
          git push -u origin "$BRANCH"
          gh pr create \
            --title "chore: rebuild tree-sitter.wasm" \
            --body "$(cat <<'EOF'
          Automated rebuild of `wasm-build/wasm/tree-sitter.wasm` triggered by changes to `Cargo.toml` or `src/lib.rs`.

          The Chicory-generated Java classes have been validated via `mvn install -DskipTests`.
          EOF
          )" \
            --base "${{ github.ref_name }}"
