name: Rebuild tree-sitter WASM

on:
  push:
    paths:
      - 'wasm-build/Cargo.toml'
      - 'wasm-build/src/lib.rs'
  pull_request:
    paths:
      - 'wasm-build/Cargo.toml'
      - 'wasm-build/src/lib.rs'

permissions:
  contents: write
  pull-requests: write

jobs:
  rebuild-wasm:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1

      - name: Cache Cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            wasm-build/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('wasm-build/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install WASI SDK
        run: |
          WASI_SDK_VERSION=25
          curl -fsSL https://github.com/WebAssembly/wasi-sdk/releases/download/wasi-sdk-${WASI_SDK_VERSION}/wasi-sdk-${WASI_SDK_VERSION}.0-x86_64-linux.tar.gz \
            | tar xz -C /opt
          echo "WASI_SDK_PATH=/opt/wasi-sdk-${WASI_SDK_VERSION}.0-x86_64-linux" >> "$GITHUB_ENV"

      - name: Install wasm-opt (Binaryen)
        run: |
          sudo apt-get update -q
          sudo apt-get install -yq binaryen

      - name: Build WASM module
        working-directory: wasm-build
        run: make all

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Regenerate Chicory classes and build
        run: mvn install -DskipTests

      - name: Create PR with updated WASM binary
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="chore/rebuild-wasm-${{ github.sha }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add wasm-build/wasm/tree-sitter.wasm
          if git diff --cached --quiet; then
            echo "No changes to tree-sitter.wasm, skipping PR creation."
            exit 0
          fi
          git checkout -b "$BRANCH"
          git commit -m "chore: rebuild tree-sitter.wasm"
          git push -u origin "$BRANCH"
          gh pr create \
            --title "chore: rebuild tree-sitter.wasm" \
            --body "$(cat <<'EOF'
          Automated rebuild of `wasm-build/wasm/tree-sitter.wasm` triggered by changes to `Cargo.toml` or `src/lib.rs`.

          The Chicory-generated Java classes have been validated via `mvn install -DskipTests`.
          EOF
          )" \
            --base "${{ github.ref_name }}"
